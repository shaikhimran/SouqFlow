<main class="relative flex min-h-screen items-center justify-center overflow-hidden bg-offwhite px-4 py-12">

  <!-- Geometric pattern backdrop -->
  <svg class="pointer-events-none absolute inset-0 h-full w-full text-emerald" aria-hidden="true">
    <defs>
      <pattern id="girih-login" width="56" height="56" patternUnits="userSpaceOnUse">
        <g fill="none" stroke="currentColor" stroke-width="1">
          <path d="M28 4 L36 20 L52 28 L36 36 L28 52 L20 36 L4 28 L20 20 Z" />
          <rect x="20" y="20" width="16" height="16" transform="rotate(45 28 28)" />
        </g>
      </pattern>
    </defs>
    <rect width="100%" height="100%" fill="url(#girih-login)" opacity="0.05" />
  </svg>
  <div class="pointer-events-none absolute -top-20 right-0 h-72 w-72 rounded-full bg-gold/15 blur-3xl"></div>

  <!-- Card -->
  <div class="relative z-10 w-full max-w-md rounded-2xl border border-emerald/10 bg-white/90 p-8 shadow-xl shadow-navy/5 backdrop-blur">
    <!-- Brand -->
    <a routerLink="/" class="mb-8 flex items-center justify-center gap-2.5">
      <span class="flex h-10 w-10 items-center justify-center rounded-lg bg-emerald text-gold">
        <svg viewBox="0 0 24 24" class="h-6 w-6" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
          <path d="M12 2l2.4 2.4L12 6.8 9.6 4.4 12 2zM4.4 9.6L6.8 12l-2.4 2.4L2 12l2.4-2.4zM19.6 9.6L22 12l-2.4 2.4L17.2 12l2.4-2.4zM12 17.2l2.4 2.4L12 22l-2.4-2.4 2.4-2.4z" />
          <circle cx="12" cy="12" r="3" />
        </svg>
      </span>
      <span class="font-display text-2xl font-700 tracking-tight text-navy">Souq<span class="text-emerald">Flow</span></span>
    </a>

    <h1 class="text-center font-display text-2xl font-700 text-navy">Welcome back</h1>
    <p class="mt-1 text-center text-sm text-navy/55">Sign in to continue to your marketplace</p>

    <form class="mt-8 space-y-5" (ngSubmit)="onSubmit()">
      <div>
        <label for="email" class="mb-1.5 block text-sm font-600 text-navy/80">Email</label>
        <input
          id="email"
          name="email"
          type="email"
          [(ngModel)]="email"
          autocomplete="email"
          placeholder="you@example.com"
          class="w-full rounded-xl border border-navy/15 bg-offwhite px-4 py-3 text-navy outline-none transition placeholder:text-navy/35 focus:border-emerald focus:ring-2 focus:ring-emerald/20" />
      </div>

      <div>
        <div class="mb-1.5 flex items-center justify-between">
          <label for="password" class="block text-sm font-600 text-navy/80">Password</label>
          <a href="#" class="text-xs font-600 text-gold hover:text-emerald">Forgot?</a>
        </div>
        <input
          id="password"
          name="password"
          type="password"
          [(ngModel)]="password"
          autocomplete="current-password"
          placeholder="••••••••"
          class="w-full rounded-xl border border-navy/15 bg-offwhite px-4 py-3 text-navy outline-none transition placeholder:text-navy/35 focus:border-emerald focus:ring-2 focus:ring-emerald/20" />
      </div>

      <label class="flex items-center gap-2 text-sm text-navy/60">
        <input type="checkbox" name="remember" class="h-4 w-4 rounded border-navy/20 accent-emerald" />
        Remember me
      </label>

      <button
        type="submit"
        class="w-full rounded-xl bg-emerald px-4 py-3 text-base font-600 text-white shadow-lg shadow-emerald/20 transition hover:bg-emerald-dark">
        Sign in
      </button>
    </form>

    <div class="my-6 flex items-center gap-4">
      <span class="h-px flex-1 bg-navy/10"></span>
      <span class="text-xs uppercase tracking-wider text-navy/40">or</span>
      <span class="h-px flex-1 bg-navy/10"></span>
    </div>

    <p class="text-center text-sm text-navy/60">
      New to SouqFlow?
      <a href="#" class="font-600 text-emerald hover:text-gold">Create an account</a>
    </p>
  </div>
</main>
